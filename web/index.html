<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus — live</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --panel2:#0e131b; --line:#1e2733;
    --txt:#e6edf3; --dim:#7d8896; --accent:#3fb6ff; --pulse:#ff5d73; --breath:#5ad19b;
    --good:#2ecc71; --usable:#f4c95d; --reject:#ff5d73; --unknown:#6b7785;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  header{display:flex;align-items:center;justify-content:space-between;
    padding:16px 24px;border-bottom:1px solid var(--line);}
  header h1{font-size:18px;margin:0;letter-spacing:.5px;font-weight:600}
  header h1 span{color:var(--accent)}
  #status{font-size:13px;color:var(--dim);display:flex;align-items:center;gap:8px}
  #dot{width:9px;height:9px;border-radius:50%;background:var(--reject);transition:.3s}
  #dot.on{background:var(--good);box-shadow:0 0 10px var(--good)}
  .wrap{padding:24px;max-width:1200px;margin:0 auto;display:grid;gap:18px;
    grid-template-columns:repeat(12,1fr);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;}
  .span4{grid-column:span 4} .span6{grid-column:span 6} .span8{grid-column:span 8}
  .span12{grid-column:span 12}
  .label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;
    display:flex;align-items:center;justify-content:space-between}
  .big{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:64px;font-weight:600;
    line-height:1;margin:6px 0 2px}
  .unit{color:var(--dim);font-size:18px;font-weight:400;margin-left:6px}
  .light{width:10px;height:10px;border-radius:50%;display:inline-block;background:var(--unknown)}
  .light.good{background:var(--good)} .light.usable{background:var(--usable)}
  .light.reject{background:var(--reject)} .light.unknown{background:var(--unknown)}
  canvas{width:100%;display:block;border-radius:8px;background:var(--panel2)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .stat .big{font-size:40px}
  .hint{color:var(--dim);font-size:12px;margin-top:6px}
  .blink-dot{width:16px;height:16px;border-radius:50%;background:#26303d;transition:.05s}
  .blink-dot.flash{background:var(--accent);box-shadow:0 0 14px var(--accent)}
</style>
</head>
<body>
<header>
  <h1><span>argus</span> · live physiological sensing</h1>
  <div id="status"><span id="dot"></span><span id="statustext">connecting…</span></div>
</header>

<div class="wrap">
  <!-- Heart rate -->
  <div class="panel span4">
    <div class="label">Heart rate <span class="light" id="hr-light"></span></div>
    <div class="big"><span id="hr">--</span><span class="unit">bpm</span></div>
    <div class="hint">quality <span id="hr-sqi">--</span> · rPPG / POS</div>
  </div>
  <!-- Pulse waveform -->
  <div class="panel span8">
    <div class="label">Pulse waveform <span style="color:var(--pulse)">rPPG</span></div>
    <canvas id="pulse" height="150"></canvas>
  </div>

  <!-- Respiration -->
  <div class="panel span4">
    <div class="label">Respiration <span class="light" id="resp-light"></span></div>
    <div class="big"><span id="resp">--</span><span class="unit">brpm</span></div>
    <div class="hint">chest motion (indicative)</div>
  </div>
  <!-- Breathing waveform -->
  <div class="panel span8">
    <div class="label">Breathing waveform <span style="color:var(--breath)">chest</span></div>
    <canvas id="breath" height="150"></canvas>
  </div>

  <!-- secondary stats -->
  <div class="panel span12">
    <div class="grid3">
      <div class="stat">
        <div class="label">HRV (SDNN)</div>
        <div class="big"><span id="hrv">--</span><span class="unit">ms</span></div>
        <div class="hint">rest only · indicative</div>
      </div>
      <div class="stat">
        <div class="label">Blink rate <span class="blink-dot" id="blink-dot"></span></div>
        <div class="big"><span id="blink">--</span><span class="unit">/min</span></div>
        <div class="hint">adaptive EAR</div>
      </div>
      <div class="stat">
        <div class="label">Fidget / posture</div>
        <div class="big" style="font-size:32px"><span id="fidget">--</span></div>
        <div class="hint">lean <span id="posture">--</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const WS_PORT = 8765;
const $ = id => document.getElementById(id);

function setLight(el, gate){ el.className = "light " + (gate||"unknown"); }

// ---- scrolling waveform canvases ----
class Wave {
  constructor(id, color, n=300){
    this.c = $(id); this.ctx = this.c.getContext("2d"); this.color = color;
    this.buf = new Array(n).fill(0); this.resize();
    window.addEventListener("resize", ()=>this.resize());
  }
  resize(){ this.c.width = this.c.clientWidth * devicePixelRatio;
            this.c.height = this.c.clientHeight * devicePixelRatio; }
  push(v){ this.buf.push(v); if(this.buf.length>300) this.buf.shift(); }
  draw(){
    const ctx=this.ctx, W=this.c.width, H=this.c.height; ctx.clearRect(0,0,W,H);
    // grid midline
    ctx.strokeStyle="#1b2430"; ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
    const n=this.buf.length; let max=1e-6;
    for(const v of this.buf) max=Math.max(max,Math.abs(v));
    ctx.strokeStyle=this.color; ctx.lineWidth=2*devicePixelRatio; ctx.beginPath();
    for(let i=0;i<n;i++){
      const x=W*i/(n-1), y=H/2 - (this.buf[i]/max)*(H*0.42);
      i? ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.stroke();
    // leading glow dot
    const lx=W, ly=H/2-(this.buf[n-1]/max)*(H*0.42);
    ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(lx-3,ly,3*devicePixelRatio,0,7); ctx.fill();
  }
}
const pulse=new Wave("pulse","#ff5d73"), breath=new Wave("breath","#5ad19b");
function loop(){ pulse.draw(); breath.draw(); requestAnimationFrame(loop); } loop();

// ---- websocket ----
function connect(){
  const ws=new WebSocket(`ws://${location.hostname}:${WS_PORT}`);
  ws.onopen =()=>{ $("dot").classList.add("on"); $("statustext").textContent="live"; };
  ws.onclose=()=>{ $("dot").classList.remove("on"); $("statustext").textContent="reconnecting…";
                   setTimeout(connect,1500); };
  ws.onmessage=e=>{
    const m=JSON.parse(e.data); const v=m.value;
    switch(m.name){
      case "hr": $("hr").textContent=v.toFixed(0); $("hr-sqi").textContent=m.sqi.toFixed(2);
                 setLight($("hr-light"), m.gate); break;
      case "pulse_wave": pulse.push(v); break;
      case "resp": $("resp").textContent=v.toFixed(1); setLight($("resp-light"), m.gate); break;
      case "breath_wave": breath.push(v); break;
      case "hrv": $("hrv").textContent=v.toFixed(0); break;
      case "blink_rate": $("blink").textContent=v.toFixed(1); break;
      case "blink_event": { const d=$("blink-dot"); d.classList.add("flash");
                            setTimeout(()=>d.classList.remove("flash"),120); break; }
      case "fidget": $("fidget").textContent=v.toFixed(3); break;
      case "posture_lean": $("posture").textContent=v.toFixed(3); break;
    }
  };
}
connect();
</script>
</body>
</html>
