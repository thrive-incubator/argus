<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus — screen gaze</title>
<style>
  html,body{margin:0;height:100%;background:#05080c;color:#e9f0f7;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;cursor:none}
  #ui{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;cursor:auto}
  button{background:#15212e;color:#e9f0f7;border:1px solid #2a3a4d;border-radius:10px;
    padding:10px 18px;font-size:14px;cursor:pointer;margin:0 4px}
  button:hover{border-color:#3fb6ff}
  #msg{margin-top:10px;color:#8a97a6;font-size:13px;max-width:560px}
  #acc{color:#5ad19b}
  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block}
  #conn{position:fixed;bottom:14px;left:16px;font-size:12px;color:#7c8896;cursor:auto}
  #conn b{color:#ff5d73}#conn b.on{color:#2ecc71}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <button id="cal">Start calibration</button>
  <button id="recal" style="display:none">Recalibrate</button>
  <div id="msg">Press <b>F</b> for fullscreen. Sit ~50–60 cm away. <b>Keep your head still and move
    only your EYES</b> — during calibration AND while using it (a webcam can't tell a head-turn
    from an eye-move). Click “Start calibration” and flick your eyes to each dot until it pops.</div>
  <div id="acc"></div>
</div>
<div id="conn"><b id="cdot">●</b> <span id="cstat">connecting…</span></div>

<script>
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;}
resize(); addEventListener("resize",resize);
const W=()=>cv.width, H=()=>cv.height;

// ---- state ----
let feat=null;                 // latest gaze feature vector from the server
let model=null;                // fitted regression weights
let gaze={x:0.5,y:0.5,has:false};
let mode="idle";               // idle | calibrating | tracking
const samples=[];              // [{f:[...], t:[px,py]}]

// 13 calibration targets (fractional screen coords)
const PTS=[[.5,.5],[.08,.08],[.5,.08],[.92,.08],[.08,.5],[.92,.5],
           [.08,.92],[.5,.92],[.92,.92],[.29,.29],[.71,.29],[.29,.71],[.71,.71]];

// ---- tiny linear algebra (ridge regression) ----
function poly(f){const x=[f[0],f[1],f[2],f[3],f[4]-0.5,f[5]-0.5];const t=[1];
  for(let i=0;i<6;i++)t.push(x[i]); for(let i=0;i<6;i++)for(let j=i;j<6;j++)t.push(x[i]*x[j]); return t;}
function fit(S,lambda){
  const X=S.map(s=>poly(s.f)), Y=S.map(s=>s.t), C=X[0].length;
  const A=Array.from({length:C},()=>new Float64Array(C)), B=Array.from({length:C},()=>new Float64Array(2));
  for(let i=0;i<X.length;i++){const r=X[i];
    for(let a=0;a<C;a++){const ra=r[a]; if(!ra)continue;
      for(let b=a;b<C;b++)A[a][b]+=ra*r[b]; B[a][0]+=ra*Y[i][0]; B[a][1]+=ra*Y[i][1];}}
  for(let a=0;a<C;a++){for(let b=0;b<a;b++)A[a][b]=A[b][a]; A[a][a]+=lambda;}
  // Gauss-Jordan solve A W = B
  for(let c=0;c<C;c++){let p=c;for(let r=c+1;r<C;r++)if(Math.abs(A[r][c])>Math.abs(A[p][c]))p=r;
    [A[c],A[p]]=[A[p],A[c]];[B[c],B[p]]=[B[p],B[c]];const pv=A[c][c]||1e-9;
    for(let j=c;j<C;j++)A[c][j]/=pv; B[c][0]/=pv;B[c][1]/=pv;
    for(let r=0;r<C;r++){if(r===c)continue;const fr=A[r][c];if(!fr)continue;
      for(let j=c;j<C;j++)A[r][j]-=fr*A[c][j]; B[r][0]-=fr*B[c][0]; B[r][1]-=fr*B[c][1];}}
  return B; // weights C×2
}
function predict(f){const p=poly(f);let sx=0,sy=0;for(let i=0;i<p.length;i++){sx+=p[i]*model[i][0];sy+=p[i]*model[i][1];}return [sx,sy];}

// ---- calibration sequence ----
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let target=null;
async function calibrate(){
  mode="calibrating"; samples.length=0; document.getElementById("acc").textContent="";
  document.getElementById("cal").style.display="none";
  for(let i=0;i<PTS.length;i++){
    target={x:PTS[i][0],y:PTS[i][1],grow:0};
    msg(`Look at the dot (${i+1}/${PTS.length})…`);
    await sleep(750);                 // settle
    const buf=[]; const t0=performance.now();
    while(performance.now()-t0<850){ if(feat) buf.push(feat.slice()); await sleep(40); }
    if(buf.length>3){
      const avg=buf[0].map((_,k)=>buf.reduce((s,v)=>s+v[k],0)/buf.length);
      samples.push({f:avg,t:[PTS[i][0],PTS[i][1]]});
    }
    target.pop=true; await sleep(120);
  }
  target=null;
  model=fit(samples,1e-3);
  // report mean calibration residual as % of screen
  let err=0; for(const s of samples){const [px,py]=predict(s.f); err+=Math.hypot(px-s.t[0],py-s.t[1]);}
  err/=samples.length;
  document.getElementById("acc").textContent=`calibrated · mean error ≈ ${(err*100).toFixed(1)}% of screen`;
  document.getElementById("recal").style.display="inline-block";
  msg("Now move your EYES (keep your head still) — the dot follows your gaze. Recalibrate if you shift your head.");
  mode="tracking";
}

function msg(t){document.getElementById("msg").textContent=t;}

// ---- render loop ----
function draw(){
  ctx.clearRect(0,0,W(),H());
  if(mode==="calibrating" && target){
    const x=target.x*W(), y=target.y*H();
    const r=(target.pop?28:14)*devicePixelRatio;
    ctx.fillStyle="#3fb6ff"; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(x,y,4*devicePixelRatio,0,7); ctx.fill();
  }
  if(mode==="tracking" && gaze.has){
    const x=gaze.x*W(), y=gaze.y*H();
    const g=ctx.createRadialGradient(x,y,0,x,y,90*devicePixelRatio);
    g.addColorStop(0,"#3fb6ffcc"); g.addColorStop(1,"#3fb6ff00");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,90*devicePixelRatio,0,7); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(x,y,6*devicePixelRatio,0,7); ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();

// ---- websocket ----
function connect(){
  const ws=new WebSocket(`ws://${location.hostname}:8765`);
  ws.onopen=()=>{document.getElementById("cdot").classList.add("on");document.getElementById("cstat").textContent="live";};
  ws.onclose=()=>{document.getElementById("cdot").classList.remove("on");document.getElementById("cstat").textContent="reconnecting…";setTimeout(connect,1500);};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.name==="gaze_raw" && Array.isArray(m.value)){
      feat=m.value;
      if(mode==="tracking" && model){
        const [sx,sy]=predict(feat);
        const a=0.35;
        gaze.x=gaze.has?gaze.x+a*(sx-gaze.x):sx; gaze.y=gaze.has?gaze.y+a*(sy-gaze.y):sy; gaze.has=true;
      }
    }
  };
}
connect();

document.getElementById("cal").onclick=calibrate;
document.getElementById("recal").onclick=()=>{model=null;gaze.has=false;document.getElementById("cal").style.display="inline-block";calibrate();};
addEventListener("keydown",e=>{ if(e.key==="f"||e.key==="F"){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }});
</script>
</body>
</html>
